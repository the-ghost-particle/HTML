<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="KUkwattage">
    <meta name="description" content="Contact Us page">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
    <title>The Little Taco Shop</title>
</head>

<body>
    <section>
        <h1>Contact Us</h1>
        <nav>
            <ul>
                <li>
                    <a href="home.html#about-us">About LTS</a>
                </li>
                <li>
                    <a href="home.html#our-menu">Our Menu</a>
                </li>
                <li>
                    <a href="hours.html">Store Hours</a>
                </li>
                <li>
                    <a href="contact-us.html">Contact Us</a>
                </li>
            </ul>
        </nav>
        <figure>
            <img src="img/tacos_close_up_400x260.png" alt="Taco-closup-image" width="400" height="267">
            <figcaption>A Little Taco Shop Tacos</figcaption>
        </figure>
        <hr>
    </section>
    <section>
        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org/post" method="post">
            <fieldset>
                <legend>Send Us A Message</legend>
                <p>
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name" required autofocus autocomplete="on"
                        placeholder="your name">
                </p>
                <p>
                    <label for="email">Email:</label>
                    <input type="text" name="email" id="email" required autocomplete="on" placeholder="your email">
                </p>
                <p>
                    <label for="message">Your Message:</label>
                    <br>
                    <textarea name="message" id="message" placeholder="Type your message here" cols="30"
                        rows="12"></textarea>
                </p>
            </fieldset>
            <button type="submit">send</button>
            <button type="reset">reset</button>
        </form>

        <h2>Our Location</h2>
        <address>
            555 Taco Temptation Lane, Suite T
            <br>
            Kansas City, MO55555-5555
        </address>
        <p>
            Phone:
            <a href="tel"><em>555-555-5555</em></a>
        </p>
        <p>
            <a href="#">Back To Top</a>
        </p>
    </section>
    <hr>
    <p>Copyright &copy; The Little Taco Shop</p>
</body>

</html>
